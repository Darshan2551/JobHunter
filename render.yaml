services:
  - type: web
    name: job-hunter-dashboard
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: JOBS_DB_PATH
        value: jobs.db
      - key: DASHBOARD_DEFAULT_DAYS
        value: "30"
